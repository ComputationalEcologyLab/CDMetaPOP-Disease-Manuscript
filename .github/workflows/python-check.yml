name: Compatibility Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} / Py ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false 
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt --ignore-installed || echo "No requirements.txt found"

    - name: Environment Report
      run: |
        python --version
        pip list

    - name: Run Fig 1 Test
      working-directory: ./Figure_Reproduction/Figure1
      run: |
        python Fig_1_from_data.py

    - name: Run Fig 2 Test
      working-directory: ./Figure_Reproduction/Figure2
      run: |
        python Plot_CDMetaPOPFit.py

    - name: Run Fig 3 Test
      working-directory: ./Figure_Reproduction/Figure3
      run: |
        python Plot_CDMetaPOPFit.py










